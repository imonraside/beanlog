    const INITIAL_BEAN = { id: null, name: "", country: "", region: "", variety: "", processing: "", altitude: "", roastingLevel: "", producer: "", roastingDate: "", purchaseDate: "", shop: "", purchaseUrl: "", weight: "", price: "", pricePerCup: "", notes: "", flavorDesc: "", memo: "", isFinished: false, isBlend: false, blendInfo: [], mainImage: null, ocrImage: null, tastings: [] };
    const INITIAL_TASTING = { date: new Date().toISOString().split('T')[0], scores: { acidity: 7.0, balance: 7.0, sweetness: 7.0, cleanCup: 7.0, body: 7.0, flavor: 7.0 }, isManualTotal: false, totalScore: 7.0, notes: "", desc: "", memo: "" };

    const TASTE_ITEMS = [{ id: 'acidity', label: '산미' }, { id: 'balance', label: '밸런스' }, { id: 'sweetness', label: '단맛' }, { id: 'cleanCup', label: '클린컵' }, { id: 'body', label: '바디' }, { id: 'flavor', label: '아로마' }];
    const SCORE_LABELS_KO = { acidity: "산미", balance: "밸런스", sweetness: "단맛", cleanCup: "클린컵", body: "바디", flavor: "아로마" };

    const generateShareText = (bean, tasting) => {
        const score = getDisplayScore(tasting);
        const scoresText = Object.entries(tasting.scores).map(([key, val]) => `- ${SCORE_LABELS_KO[key]}: ${val}`).join('\n');

원두: ${bean.name}
국가: ${bean.country || '-'} / 지역: ${bean.region || '-'}
가공: ${bean.processing || '-'} / 로스팅: ${bean.roastingLevel || '-'} (${bean.roastingDate || '-'})

[세부 점수]
${scoresText}

노트: ${tasting.notes || '-'}
평가: ${tasting.desc || '-'}
메모: ${tasting.memo || '-'}`;
    };

구매처: ${bean.shop || '-'} / 구매일: ${bean.purchaseDate || '-'}

${bean.purchaseUrl ? `링크: ${bean.purchaseUrl}\n` : ''}

향미: ${bean.flavorDesc || '-'}

    };

    // v1.8.1: Full Flavor Data Set (8 Categories, 87 Notes)
    const FLAVOR_DATA = [

      { id: 'floral', label: '꽃/차 (Floral)', color: 'bg-fuchsia-500', bg: 'bg-fuchsia-50 dark:bg-fuchsia-900/20', text: 'text-fuchsia-700 dark:text-fuchsia-300', subs: [ { group: '꽃 향기', items: ['자스민', '장미', '카모마일', '라벤더', '히비스커스', '아카시아', '엘더플라워', '벚꽃', '목련'] }, { group: '차 (Tea)', items: ['홍차', '녹차', '얼그레이', '우롱차', '말차', '보리차', '허브티'] } ] },
      { id: 'sweet', label: '달콤함 (Sweet)', color: 'bg-orange-400', bg: 'bg-orange-50 dark:bg-orange-900/20', text: 'text-orange-700 dark:text-orange-300', subs: [ { group: '설탕/시럽', items: ['꿀', '흑설탕', '캬라멜', '메이플 시럽', '조청', '당밀', '달고나', '황설탕'] }, { group: '디저트/크림', items: ['바닐라', '버터', '크림', '마시멜로우', '토피', '연유', '커스터드', '생크림'] } ] },
      { id: 'nutty', label: '견과/초코 (Nutty)', color: 'bg-amber-700', bg: 'bg-amber-50 dark:bg-amber-900/20', text: 'text-amber-900 dark:text-amber-300', subs: [ { group: '초콜릿', items: ['다크 초콜릿', '밀크 초콜릿', '카카오닙스', '코코아 파우더', '초코시럽'] }, { group: '견과류', items: ['아몬드', '호두', '땅콩', '헤이즐넛', '피칸', '캐슈넛', '마카다미아', '피스타치오', '밤'] } ] },
      { id: 'roasted', label: '고소함 (Roasted)', color: 'bg-stone-500', bg: 'bg-stone-100 dark:bg-stone-900/20', text: 'text-stone-700 dark:text-stone-300', subs: [ { group: '곡물 (Cereal)', items: ['곡물', '맥아', '볶은 보리', '토스트', '누룽지', '뻥튀기', '비스킷', '라이맥', '오트밀'] }, { group: '로스트 (Roast)', items: ['스모키', '탄맛', '재(Ash)', '타바코', '가죽', '훈제'] }, { group: '감칠맛 (Savory)', items: ['간장', '된장', '팝콘', '버터맛'] } ] },
      { id: 'spices', label: '향신료 (Spices)', color: 'bg-rose-900', bg: 'bg-rose-50 dark:bg-rose-900/20', text: 'text-rose-900 dark:text-rose-300', subs: [ { group: '브라운 스파이스', items: ['시나몬', '정향', '육두구', '아니스', '감초', '계피'] }, { group: '허브/기타', items: ['후추', '생강', '민트', '세이지', '딜', '레몬그라스', '바질', '유칼립투스', '카레'] } ] },
      { id: 'vegetal', label: '채소/지구 (Vegetal)', color: 'bg-green-600', bg: 'bg-green-50 dark:bg-green-900/20', text: 'text-green-700 dark:text-green-300', subs: [ { group: '흙내음 (Earthy)', items: ['흙', '나무(Woody)', '건초', '지푸라기', '버섯', '이끼', '숲바닥'] }, { group: '채소 (Vegetable)', items: ['오이', '완두콩', '호박', '피망', '풀(Grassy)', '올리브', '깻잎'] } ] },
      { id: 'sour', label: '산미/발효 (Sour)', color: 'bg-yellow-500', bg: 'bg-yellow-50 dark:bg-yellow-900/20', text: 'text-yellow-800 dark:text-yellow-300', subs: [ { group: '알콜/발효', items: ['와인', '위스키', '럼', '샴페인', '막걸리', '발효취', '뱅쇼'] }, { group: '산미/기타', items: ['식초', '요거트', '치즈', '시큼한', '고무', '약품'] } ] }
    ];

    const idb = {
        db: null,
        init: () => new Promise((resolve, reject) => {
            if(idb.db) return resolve(idb.db);
            const req = indexedDB.open("BeanLogDB", 1);
            req.onupgradeneeded = (e) => { const db = e.target.result; if(!db.objectStoreNames.contains("store")) db.createObjectStore("store"); };
            req.onsuccess = (e) => { idb.db = e.target.result; resolve(idb.db); };
            req.onerror = (e) => reject(e);
        }),
        get: async (key) => { await idb.init(); return new Promise(r => { const tx = idb.db.transaction("store", "readonly"); const req = tx.objectStore("store").get(key); req.onsuccess = () => r(req.result); req.onerror = () => r(null); }); },
        set: async (key, val) => { await idb.init(); return new Promise(r => { const tx = idb.db.transaction("store", "readwrite"); const req = tx.objectStore("store").put(val, key); req.onsuccess = () => r(true); req.onerror = () => r(false); }); },
        del: async (key) => { await idb.init(); return new Promise(r => { const tx = idb.db.transaction("store", "readwrite"); const req = tx.objectStore("store").delete(key); req.onsuccess = () => r(true); req.onerror = () => r(false); }); }
    };

    const migrateStorage = async () => {
        const keys = ["BEAN_LOG_MASTER_FINAL_data", "BEAN_LOG_MASTER_FINAL_recipes", "BEAN_LOG_MASTER_FINAL_key", "BEAN_LOG_MASTER_FINAL_theme", "BEAN_LOG_MASTER_FINAL_note_mode", "BEAN_LOG_MASTER_FINAL_sort_mode"];
        for (const k of keys) {
            const local = localStorage.getItem(k);
            if (local) { try { const parsed = JSON.parse(local); const exists = await idb.get(k); if (!exists) { await idb.set(k, parsed); } } catch(e){} }
        }
    };

    const formatTime = (sec) => `${Math.floor(sec/60)}:${(sec%60)<10?'0':''}${sec%60}`;
    const calculateRatio = (b, w) => { 
        const bean = parseFloat(b)||0; if(bean===0) return "0:0"; 
        let totalWater = 0; const matches = w.trim().match(/(\d+(?:\.\d+)?)(?:g)?/g); 
        if (matches) matches.forEach(m => { if (!m.includes('g')) totalWater += parseFloat(m); }); 
        return `1 : ${(totalWater/bean).toFixed(1)}`; 
    };

    const parseTags = (text) => {
        if (!text) return [];
        if (/[,/]/.test(text)) return text.split(/[,/]+/).map(t => t.trim()).filter(Boolean);
        return text.split(/\s+/).map(t => t.trim()).filter(Boolean);
    };
    const calcAvg = (scores) => { const values = Object.values(scores).map(v => parseFloat(v)); if (values.some(v => isNaN(v))) return "0.0"; return (values.reduce((a, b) => a + b, 0) / 6).toFixed(1); };
    const getDisplayScore = (tasting) => (tasting.isManualTotal && tasting.totalScore !== undefined) ? Number(tasting.totalScore).toFixed(1) : calcAvg(tasting.scores);
    const getMaxScoreVal = (tastings) => (!tastings.length) ? 0 : Math.max(...tastings.map(t => parseFloat(getDisplayScore(t))));
    const getMaxScore = (tastings) => getMaxScoreVal(tastings).toFixed(1);
    const getBestTastingNote = (tastings) => { if (!tastings || tastings.length === 0) return null; const sorted = [...tastings].sort((a, b) => parseFloat(getDisplayScore(b)) - parseFloat(getDisplayScore(a))); return sorted[0].notes; };
    const calcPricePer100g = (price, weight) => { if(!price || !weight) return null; const p = parseFloat(price.replace(/,/g, '')); const w = parseFloat(weight); if(isNaN(p) || isNaN(w) || w === 0) return null; return Math.round((p / w) * 100).toLocaleString(); };
    const formatWeight = (g) => { const num = parseFloat(g); if (isNaN(num)) return "0g"; if (num >= 1000) return `${(num/1000).toFixed(1)}kg`; return `${num}g`; };
    
    const getFlagEmoji = (countryName) => {
        if (!countryName) return null;
        const lower = countryName.toLowerCase().trim();
        const map = {
            '한국': '🇰🇷', 'korea': '🇰🇷', '대한민국': '🇰🇷', '에티오피아': '🇪🇹', 'ethiopia': '🇪🇹', '콜롬비아': '🇨🇴', 'colombia': '🇨🇴',
            '브라질': '🇧🇷', 'brazil': '🇧🇷', '과테말라': '🇬🇹', 'guatemala': '🇬🇹', '케냐': '🇰🇪', 'kenya': '🇰🇪',
            '코스타리카': '🇨🇷', 'costa rica': '🇨🇷', 'costarica': '🇨🇷', '파나마': '🇵🇦', 'panama': '🇵🇦',
            '엘살바도르': '🇸🇻', 'el salvador': '🇸🇻', 'elsalvador': '🇸🇻', '온두라스': '🇭🇳', 'honduras': '🇭🇳',
            '인도네시아': '🇮🇩', 'indonesia': '🇮🇩', '베트남': '🇻🇳', 'vietnam': '🇻🇳', '예멘': '🇾🇪', 'yemen': '🇾🇪',
            '르완다': '🇷🇼', 'rwanda': '🇷🇼', '부룬디': '🇧🇮', 'burundi': '🇧🇮', '탄자니아': '🇹🇿', 'tanzania': '🇹🇿',
            '멕시코': '🇲🇽', 'mexico': '🇲🇽', '페루': '🇵🇪', 'peru': '🇵🇪', '볼리비아': '🇧🇴', 'bolivia': '🇧🇴',
            '에콰도르': '🇪🇨', 'ecuador': '🇪🇨', '인도': '🇮🇳', 'india': '🇮🇳', '파푸아뉴기니': '🇵🇬', 'papua new guinea': '🇵🇬',
            '미국': '🇺🇸', 'usa': '🇺🇸', 'us': '🇺🇸', '하와이': '🇺🇸', '중국': '🇨🇳', 'china': '🇨🇳', '호주': '🇦🇺', 'australia': '🇦🇺', '니카라과': '🇳🇮',
        };
        for (const [key, emoji] of Object.entries(map)) { if (lower.includes(key)) return emoji; }
        return null;
    };
    
    const getRoastAge = (dateStr) => {
        if (!dateStr) return null;
        const now = new Date();
        const [y, m, d] = dateStr.split('-').map(Number);
        const roast = new Date(y, m - 1, d);
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const diff = Math.floor((today - roast) / (86400000));

    const useLongPress = (callback = () => {}, speed = 100, delay = 400) => {
      const timerRef = useRef(null); 
      const delayRef = useRef(null); 
      const isTouchRef = useRef(false);
      const start = useCallback((event) => {
        if (event.type === 'touchstart') isTouchRef.current = true;
        else if (event.type === 'mousedown' && isTouchRef.current) return;
        callback(); 
        delayRef.current = setTimeout(() => { timerRef.current = setInterval(callback, speed); }, delay);
      }, [callback, speed, delay]);
      const stop = useCallback(() => {
        if (delayRef.current) clearTimeout(delayRef.current);
        if (timerRef.current) clearInterval(timerRef.current);
        delayRef.current = null; timerRef.current = null;
        setTimeout(() => { isTouchRef.current = false; }, 500);
      }, []);
      return { onMouseDown: start, onMouseUp: stop, onMouseLeave: stop, onTouchStart: (e) => { if(e.cancelable) e.preventDefault(); start(e); }, onTouchEnd: stop };
    };

    const AccurateRadarChart = ({ scores }) => {

      const labels = ['산미', '밸런스', '단맛', '클린컵', '바디', '아로마'];
      const getPoint = (value, index) => { const angle = (Math.PI * 2 * index) / 6 - Math.PI / 2; const val = parseFloat(value) || 0; const r = (val / 10) * radius; return `${center + r * Math.cos(angle)},${center + r * Math.sin(angle)}`; };
      const gridLevels = [10, 8, 6, 4, 2];
      const bgPoints = gridLevels.map(scale => keys.map((_, i) => getPoint(scale, i)).join(' '));
      const dataPoints = keys.map((key, i) => getPoint(scores[key], i)).join(' ');
      const labelCoords = keys.map((_, i) => { const angle = (Math.PI * 2 * i) / 6 - Math.PI / 2; const r = radius + 12; return { x: center + r * Math.cos(angle), y: center + r * Math.sin(angle), text: labels[i] }; });

        <svg width="100%" height="100%" viewBox={`0 0 ${size} ${size}`} className="overflow-visible font-capture">

          {keys.map((_, i) => { const end = getPoint(10, i).split(','); return <line key={i} x1={center} y1={center} x2={end[0]} y2={end[1]} stroke="#e2e8f0" strokeWidth="0.8" /> })}

          {labelCoords.map((l, i) => <text key={i} x={l.x} y={l.y} textAnchor="middle" dominantBaseline="middle" fontSize="8" fill="#64748b" fontWeight="bold">{l.text}</text>)}

><CustomBeanIcon size={10} /> NOTE</span><p className="text-xs font-medium text-slate-600 leading-relaxed pt-[1px]">{beanTags.join(', ')}</p></div>)}</div><div className="space-y-2 pt-2 border-t border-dashed border-slate-100">{bean.flavorDesc && (<p className="text-xs text-slate-700 font-medium leading-relaxed"><Quote size={12} className="inline text-slate-300 mr-1 -mt-1"/>{bean.flavorDesc}</p>)}{bean.memo && (<div className="flex gap-2 items-start"><StickyNote size={12} className="text-slate-400 shrink-0 mt-0.5"/><div className="text-[10px] text-slate-500 font-medium leading-snug whitespace-pre-wrap">{bean.memo}</div></div>)}</div></div><div className="bg-slate-900 text-white text-center py-2"><p className="text-[8px] font-bold tracking-[0.2em] uppercase opacity-60 font-brand">Recorded with BeanLog</p></div></div></div>

        switch (iconType) {

    const parseStepCommand = (inputStr) => {
        const lower = inputStr.toLowerCase().trim();
        const numMatch = lower.match(/(\d+(?:\.\d+)?)/);
        const value = numMatch ? parseFloat(numMatch[0]) : null;
        let prefixStr = "", suffixStr = "";
        if (value !== null) {
            const numIndex = lower.indexOf(numMatch[0]);
            prefixStr = lower.substring(0, numIndex);
            suffixStr = lower.substring(numIndex + numMatch[0].length);
        } else { prefixStr = lower; }

        const dict = {
            pre: { cl: { text: "스위치 닫고", icon: 'CLOSE' }, op: { text: "스위치 열고", icon: 'OPEN' }, st: { text: "젓고", icon: 'STIR' }, sw: { text: "흔들고", icon: 'SWIRL' } },
            post: { cl: { text: "스위치 닫기", icon: 'CLOSE' }, op: { text: "스위치 열기", icon: 'OPEN' }, st: { text: "젓기", icon: 'STIR' }, sw: { text: "흔들기", icon: 'SWIRL' } },
            style: { c: { text: "Circle", icon: 'CIRCLE' }, s: { text: "Spiral", icon: 'SPIRAL' }, ct: { text: "Center", icon: 'CENTER' }, k: { text: "Center", icon: 'CENTER' } }
        };

        const analyze = (str, type) => {
            let temp = str, items = [], foundStyle = null;
            ['cl', 'op', 'st', 'sw'].forEach(key => { if (temp.includes(key)) { items.push({ ...dict[type][key], key }); temp = temp.replace(key, ''); } });
            if (temp.includes('ct') || temp.includes('k')) { foundStyle = dict.style.ct; } else if (temp.includes('s')) { foundStyle = dict.style.s; } else if (temp.includes('c')) { foundStyle = dict.style.c; }
            return { items, foundStyle };
        };

        const pre = analyze(prefixStr, 'pre'), suf = analyze(suffixStr, 'post');
        let sentenceParts = [], icons = [];

        pre.items.forEach(item => {
            let text = item.text;
            if (value === null && dict.post[item.key]) text = dict.post[item.key].text;
            sentenceParts.push(text); icons.push({ type: 'PRE', icon: item.icon });
        });

        const appliedStyle = pre.foundStyle || suf.foundStyle;
        let stepMeta = { value: null, isBean: false };

        if (value !== null) {
            const isBean = lower.includes('g') && !lower.includes('ml');
            stepMeta = { value, isBean };

            suf.items.forEach(item => { sentenceParts.push(item.text); icons.push({ type: 'POST', icon: item.icon }); });

        const totalSec = min * 60 + sec;

                setShowAddShopModal(false);
                setNewShop({ name: "", url: "" });
                showToastMsg("구매처가 추가되었습니다.");
            } else {
                showToastMsg("저장 실패!");
            }
        };

        const handleDeleteShop = async (shopId, e) => {
            e.stopPropagation();
            if (confirm("이 구매처를 목록에서 삭제하시겠습니까?")) {
                const updatedShops = shops.filter(s => s.id !== shopId);
                if (await idb.set(SHOP_STORAGE_KEY, updatedShops)) {
                    setShops(updatedShops);
                    showToastMsg("구매처가 삭제되었습니다.");
                } else {
                    showToastMsg("삭제 실패!");
                }
            }
        };

        const combinedShops = useMemo(() => {
            const shopMap = new Map();
            shops.forEach(shop => {
                if (shop.name) {
                    shopMap.set(shop.name.toLowerCase(), { id: shop.id, name: shop.name, url: shop.url, isManaged: true });
                }
            });
            beans.forEach(bean => {
                if (bean.shop && bean.purchaseUrl && !shopMap.has(bean.shop.toLowerCase())) {
                    shopMap.set(bean.shop.toLowerCase(), { id: `bean-${bean.id}`, name: bean.shop, url: bean.purchaseUrl, isManaged: false });
                }
            });
            return Array.from(shopMap.values()).sort((a, b) => a.name.localeCompare(b.name, 'ko'));
        }, [beans, shops]);

        const handleShopChange = (e) => { const val = e.target.value; const match = beans.find(b => b.shop && b.shop.toLowerCase() === val.toLowerCase() && b.purchaseUrl); setBeanForm(prev => ({ ...prev, shop: val, purchaseUrl: match ? match.purchaseUrl : prev.purchaseUrl })); if (match && match.purchaseUrl !== beanForm.purchaseUrl) { showToastMsg(`URL 자동 입력: ${match.shop}`); } };
        const sortedBeans = useMemo(() => { 
            let result = beans; 
            if (filterMode === 'BEAN') result = result.filter(b => b.weight); 
            else if (filterMode === 'CUP') result = result.filter(b => b.pricePerCup); 
            if (searchTerm.trim()) { 
                const terms = searchTerm.toLowerCase().split(/\s+/).filter(t => t.length > 0); 
                result = result.filter(bean => { const text = [bean.name, bean.country, bean.region, bean.variety, bean.processing, bean.roastingLevel, bean.shop, bean.notes, bean.flavorDesc, bean.memo, ...(bean.tastings ? bean.tastings.map(t => `${t.notes} ${t.memo}`) : [])].join(" ").toLowerCase(); return terms.every(t => text.includes(t)); }); 
            } 
            return [...result].sort((a, b) => { 
                switch (sortMode) { 
                    case SORT_MODE.PURCHASE_DESC: if (!a.purchaseDate) return 1; if (!b.purchaseDate) return -1; return b.purchaseDate.localeCompare(a.purchaseDate); 
                    case SORT_MODE.ROAST_DESC: 
                        const wA = parseFloat(a.weight)||0; const wB = parseFloat(b.weight)||0; 
                        if(wA>0 && wB===0) return -1; if(wA===0 && wB>0) return 1; 
                        if (!a.roastingDate) return 1; if (!b.roastingDate) return -1; return b.roastingDate.localeCompare(a.roastingDate); 
                    case SORT_MODE.SCORE_DESC: const scoreA = getMaxScoreVal(a.tastings); const scoreB = getMaxScoreVal(b.tastings); if (scoreA !== scoreB) return scoreB - scoreA; return b.id - a.id; 
                    case SORT_MODE.STATUS_ASC: const getRank = (item) => { const isBean = !!item.weight; if (isBean) return item.isFinished ? 1 : 0; return 2; }; const rankA = getRank(a); const rankB = getRank(b); if (rankA !== rankB) return rankA - rankB; return b.id - a.id; 
                    case SORT_MODE.CREATED_DESC: default: return b.id - a.id; 
                } 
            }); 
        }, [beans, searchTerm, filterMode, sortMode]);

        if(!active) return null;

        return (
            <div className={`h-full flex flex-col bg-slate-50 dark:bg-slate-950 relative ${active ? 'block' : 'hidden'}`}>
                {/* ... BeansTab Content ... */}
                {showImportInput && (
                    <div className="fixed inset-0 z-[70] bg-black/50 dark:bg-black/70 flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowImportInput(false)}>
                        <div className="bg-white dark:bg-slate-900 w-full max-w-xs rounded-2xl p-6 shadow-xl animate-pop space-y-4" onClick={e => e.stopPropagation()}>
                            <h3 className="text-lg font-bold text-slate-900 dark:text-white">공유 링크로 원두 추가</h3><input className="w-full bg-slate-100 dark:bg-slate-800 dark:text-white p-3 rounded-xl text-sm font-bold outline-none" placeholder="https://..." value={importUrl} onChange={(e) => setImportUrl(e.target.value)} /><div className="flex gap-2"><button onClick={() => setShowImportInput(false)} className="flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-xl font-bold">취소</button><button onClick={handleImportBean} className="flex-1 py-3 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-xl font-bold">불러오기</button></div>
                        </div>
                    </div>
                )}
                {cropImage && <ImageCropper imageSrc={cropImage} aspectRatio={cropRatio} onComplete={onCropFinish} onCancel={() => setCropImage(null)} />}
                {showShopList && (
                    <div className="fixed inset-0 z-[70] bg-black/50 dark:bg-black/70 flex items-end" onClick={() => window.history.back()}>
                        <div className="w-full bg-white dark:bg-slate-900 rounded-t-3xl h-[60%] p-5 flex flex-col animate-slide-up" onClick={e => e.stopPropagation()}>
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="font-bold text-lg dark:text-white flex items-center gap-2"><ShoppingBag size={20}/> 구매처 목록</h2>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setShowAddShopModal(true)} className="px-3 py-1.5 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-full text-xs font-bold flex items-center gap-1"><Plus size={14}/> 추가</button>
                                    <button onClick={() => window.history.back()} className="p-1.5 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-400"><X size={18}/></button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto space-y-2 pb-10">{combinedShops.length === 0 ? <div className="text-center py-10 text-slate-400 text-sm">등록된 구매처가 없습니다.</div> : combinedShops.map(shop => (<div key={shop.id || shop.name} className="bg-slate-50 dark:bg-slate-800 p-3 rounded-xl flex justify-between items-center"><div className="flex-1 min-w-0"><h3 className="font-bold dark:text-white truncate">{shop.name}</h3>{shop.url && <p className="text-xs text-slate-400 truncate">{shop.url}</p>}</div><div className="flex items-center gap-2 shrink-0 ml-2">{shop.url && <button onClick={() => openLink(shop.url)} className="p-2 bg-white dark:bg-slate-700 rounded-full text-blue-500"><ExternalLink size={16}/></button>}{shop.isManaged && <button onClick={(e) => handleDeleteShop(shop.id, e)} className="p-2 bg-white dark:bg-slate-700 rounded-full text-red-400"><Trash2 size={16}/></button>}</div></div>))}</div>
                        </div>
                    </div>
                )}
                {showAddShopModal && (
                    <div className="fixed inset-0 z-[80] bg-black/60 flex items-center justify-center p-4" onClick={() => setShowAddShopModal(false)}>
                        <div className="bg-white dark:bg-slate-900 w-full max-w-xs rounded-2xl p-6 shadow-xl animate-pop space-y-4" onClick={e => e.stopPropagation()}>
                            <h3 className="text-lg font-bold text-slate-900 dark:text-white">새 구매처 추가</h3>
                            <input className="w-full bg-slate-100 dark:bg-slate-800 dark:text-white p-3 rounded-xl text-sm font-bold outline-none" placeholder="구매처 이름" value={newShop.name} onChange={(e) => setNewShop({...newShop, name: e.target.value})} />
                            <input className="w-full bg-slate-100 dark:bg-slate-800 dark:text-white p-3 rounded-xl text-sm font-bold outline-none" placeholder="웹사이트 URL (선택)" value={newShop.url} onChange={(e) => setNewShop({...newShop, url: e.target.value})} />
                            <div className="flex gap-2 pt-2">
                                <button onClick={() => setShowAddShopModal(false)} className="flex-1 py-3 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-xl font-bold">취소</button>
                                <button onClick={handleAddShop} className="flex-1 py-3 bg-slate-900 dark:bg-slate-100 text-white dark:text-slate-900 rounded-xl font-bold">추가</button>
                            </div>
                        </div>
                    </div>
                )}
                {shareBeanData && <BeanShareModal bean={shareBeanData} onClose={() => setShareBeanData(null)} />}
                {shareData && <ShareModal bean={shareData.bean} tasting={shareData.tasting} onClose={() => setShareData(null)} />}
                {showFlavorPicker && (<FlavorPicker onClose={() => setShowFlavorPicker(false)} onConfirm={(text) => { if (pickerTarget === 'bean') { setBeanForm(prev => ({ ...prev, notes: text })); } else if (pickerTarget === 'tasting') { setTastingForm(prev => ({ ...prev, notes: text })); } setShowFlavorPicker(false); }} initialNotes={pickerTarget === 'bean' ? beanForm.notes : tastingForm.notes} />)}
                
                {showRandomPopup && randomBean && (
                    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/40 dark:bg-black/70 backdrop-blur-sm animate-[fadeIn_0.2s_ease-out]" onClick={() => window.history.back()}>
                        <div className="w-full max-w-xs bg-white dark:bg-slate-900 rounded-3xl shadow-2xl relative overflow-hidden animate-[scaleIn_0.2s_ease-out]" style={{ animation: 'pop 0.3s cubic-bezier(0.16, 1, 0.3, 1)' }} onClick={e => e.stopPropagation()}>
                            <div className="bg-amber-50 dark:bg-amber-900/20 p-4 flex justify-between items-center border-b border-amber-100 dark:border-amber-900/30">
                                <div className="flex items-center gap-1.5 text-amber-600"><Sparkles size={16} fill="currentColor" /><span className="text-xs font-bold uppercase tracking-wider">Today's Pick</span></div>
                                <button onClick={() => window.history.back()} className="bg-white dark:bg-slate-800 text-slate-400 p-1.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"><X size={16}/></button>
                            </div>
                            <div className="p-6 pt-5 text-center flex flex-col items-center gap-1">
                                <h2 className="text-xl font-black text-slate-900 dark:text-white leading-tight mb-1 break-keep word-keep">{randomBean.name}</h2>
                                <div className="flex flex-wrap justify-center gap-1.5 mb-4">{randomBean.country && <span className="px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded text-[10px] font-bold border border-slate-200 dark:border-slate-700">{randomBean.country}</span>}{randomBean.roastingLevel && <span className="px-2 py-0.5 bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 rounded text-[10px] font-bold border border-amber-100 dark:border-amber-900/30">{randomBean.roastingLevel}</span>}</div>
                                {randomBean.notes && (<p className="text-xs text-slate-400 mb-6 line-clamp-1">"{randomBean.notes}"</p>)}
                                <button onClick={() => { setShowRandomPopup(false); replaceView(VIEW.DETAIL, randomBean.id); }} className="px-6 py-2.5 bg-slate-900 dark:bg-slate-100 hover:bg-slate-800 dark:hover:bg-slate-200 text-white dark:text-slate-900 rounded-xl text-xs font-bold transition-all active:scale-95 shadow-lg shadow-slate-200 dark:shadow-none">상세 정보 보기</button>
                            </div>
                        </div>
                    </div>
                )}

                {toast && <div className="fixed top-10 left-1/2 -translate-x-1/2 bg-slate-900/90 text-white px-6 py-3 rounded-full text-xs font-bold shadow-xl z-[70] whitespace-nowrap">{toast}</div>}

                {view === VIEW.LIST && (
                    <>
                        <header className="p-5 pb-3 pt-4 bg-white dark:bg-slate-900 border-b dark:border-slate-800 sticky top-0 z-10 bg-white/90 dark:bg-slate-900/90 backdrop-blur space-y-3">
                            <div className="flex justify-between items-center">
                                <div><h1 className="text-2xl font-black font-brand flex items-center gap-1 dark:text-white">BeanLog <CustomBeanIcon size={24} className="text-[#4b2c20] dark:text-amber-500"/></h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest font-brand">Coffee bean archive</p></div>
                                <div className="flex gap-2">
                                    <button onClick={openShopList} className="w-10 h-10 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 rounded-full flex items-center justify-center border border-slate-200 dark:border-slate-700 active:scale-95 transition-transform"><ShoppingBag size={18}/></button>
                                    <button onClick={pickRandomBean} className="w-10 h-10 bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 rounded-full flex items-center justify-center border border-amber-100 dark:border-amber-900/30 active:scale-95 transition-transform"><Sparkles size={18}/></button>
                                    <div className="relative">
                                        <button onClick={() => setShowAddMenu(!showAddMenu)} className={`w-10 h-10 rounded-full flex items-center justify-center active:scale-95 transition-all ${showAddMenu ? 'bg-slate-900 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}`}><Plus size={20}/></button>
                                        {showAddMenu && (
                                            <>
                                                <div className="fixed inset-0 z-20" onClick={() => setShowAddMenu(false)}></div>
                                                <div className="absolute right-0 top-full mt-2 w-40 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border dark:border-slate-700 p-2 z-30 flex flex-col gap-1 animate-in slide-in-from-top-2">
                                                    <button onClick={() => { setShowAddMenu(false); setBeanForm({ ...INITIAL_BEAN }); setTempOcrImage(null); updateView(VIEW.EDIT_BEAN); }} className="text-left px-3 py-3 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300"><Plus size={16}/> 직접 추가</button>
                                                    <button onClick={() => { setShowAddMenu(false); setShowImportInput(true); }} className="text-left px-3 py-3 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300"><Link size={16}/> 링크로 추가</button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                            <div className="relative"><Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} /><input className="w-full bg-slate-100 dark:bg-slate-800 dark:text-white p-3 pl-10 rounded-2xl text-sm font-bold outline-none" placeholder="검색..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />{searchTerm && <button onClick={() => setSearchTerm("")} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400"><X size={16} fill="currentColor" className="text-slate-300"/></button>}</div>
                            <div className="flex gap-2"><div className="flex-1 flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl">{["ALL", "BEAN", "CUP"].map(mode => (<button key={mode} onClick={() => setFilterMode(mode)} className={`flex-1 py-1.5 text-xs font-bold rounded-lg transition-all ${filterMode === mode ? 'bg-white dark:bg-slate-600 text-slate-900 dark:text-white shadow-sm' : 'text-slate-400'}`}>{mode === 'ALL' ? '전체' : (mode === 'BEAN' ? '원두' : '한잔')}</button>))}</div><button onClick={() => { const newMode = listNoteMode === NOTE_MODE.BEAN ? NOTE_MODE.TASTING : NOTE_MODE.BEAN; setListNoteMode(newMode); idb.set(`${STORAGE_KEY}_note_mode`, newMode); showToastMsg(newMode === NOTE_MODE.BEAN ? "원두 노트 보기" : "시음 노트 보기"); }} className="px-3 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 flex items-center justify-center transition-colors hover:bg-slate-200 dark:hover:bg-slate-700">{listNoteMode === NOTE_MODE.BEAN ? <CustomBeanIcon size={18}/> : <Coffee size={18}/>}</button><div className="relative"><button onClick={() => setShowSortMenu(!showSortMenu)} className={`h-full px-3 rounded-xl flex items-center justify-center transition-colors ${showSortMenu ? 'bg-slate-900 text-white' : 'bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400'}`}><ArrowUpDown size={16} /></button>{showSortMenu && (<><div className="fixed inset-0 z-20" onClick={() => setShowSortMenu(false)}></div><div className="absolute right-0 top-full mt-2 w-48 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border dark:border-slate-700 p-2 z-30 flex flex-col gap-1 animate-in slide-in-from-top-2"><div className="px-3 py-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b dark:border-slate-700 mb-1">Sort By</div>{[SORT_MODE.CREATED_DESC, SORT_MODE.PURCHASE_DESC, SORT_MODE.ROAST_DESC, SORT_MODE.SCORE_DESC, SORT_MODE.STATUS_ASC].map(mode => (<button key={mode} onClick={() => { setSortMode(mode); idb.set(`${STORAGE_KEY}_sort_mode`, mode); setShowSortMenu(false); }} className={`text-left px-3 py-2 rounded-lg text-xs font-bold flex items-center justify-between ${sortMode === mode ? 'bg-slate-100 dark:bg-slate-700 text-slate-900 dark:text-white' : 'text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-700'}`}><span>{SORT_LABELS[mode]}</span> {sortMode === mode && <Check size={14}/>}</button>))}</div></>)}</div></div>
                            {sortMode !== SORT_MODE.CREATED_DESC && <div className="flex justify-end"><span className="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded flex items-center gap-1">{SORT_LABELS[sortMode]} 정렬 중 <ArrowUpDown size={10}/></span></div>}
                        </header>
                        <main className="flex-1 p-4 space-y-4 overflow-y-auto pb-24" ref={mainRef}>
                            {sortedBeans.length === 0 ? <div className="py-20 text-center opacity-40 font-bold">{searchTerm ? "검색 결과 없음" : "기록이 없습니다"}</div> : sortedBeans.map(bean => (
                                <div key={bean.id} 
                                    className="bg-white dark:bg-slate-900 p-4 rounded-3xl shadow-sm border dark:border-slate-800 flex items-start gap-4 active:scale-95 transition-transform relative overflow-hidden select-none"
                                    onTouchStart={() => handleBeanTouchStart(bean.id)} onTouchEnd={handleBeanTouchEnd} onMouseDown={() => handleBeanTouchStart(bean.id)} onMouseUp={handleBeanTouchEnd} onMouseLeave={handleBeanTouchEnd}
                                    onContextMenu={(e) => { e.preventDefault(); setBeanMenuIdx(bean.id); }}
                                    onClick={() => { if (isLongPress.current) return; if (beanMenuIdx !== null) { setBeanMenuIdx(null); return; } updateView(VIEW.DETAIL, bean.id); }}
                                >
                                    <div className="flex flex-col items-center gap-1.5 shrink-0">
                                        <div className={`w-16 h-16 rounded-xl bg-slate-100 dark:bg-slate-800 overflow-hidden relative flex items-center justify-center ${bean.isFinished ? 'text-slate-300 dark:text-slate-600' : 'text-amber-800 dark:text-amber-500'}`}>{bean.mainImage ? <img src={bean.mainImage} className="w-full h-full object-cover"/> : <CustomBeanIcon size={32}/>}</div>
                                        <div className="flex items-center gap-1">{bean.tastings.length > 0 && (<span className="bg-amber-50 dark:bg-amber-900/20 text-amber-700 dark:text-amber-400 px-1.5 py-0.5 rounded-md text-[10px] font-bold flex items-center gap-0.5 border border-amber-100 dark:border-amber-900/30"><Star size={8} fill="currentColor"/> {getMaxScore(bean.tastings)}</span>)}{bean.isFinished ? <CustomBeanIcon size={14} className="text-slate-300 dark:text-slate-600"/> : (bean.weight ? <CustomBeanIcon size={14} className="text-amber-700 dark:text-amber-500"/> : <Coffee size={14} className="text-slate-700 dark:text-slate-400"/>)}</div>

                                        <div className="text-slate-400 text-xs mt-1 leading-tight line-clamp-2">{parseTags(listNoteMode === NOTE_MODE.TASTING ? (getBestTastingNote(bean.tastings) || bean.notes) : bean.notes).join(', ')}</div>
                                    </div>
                                    {beanMenuIdx === bean.id && (
                                        <div className="absolute inset-0 bg-slate-900/95 z-20 flex items-center justify-center gap-6 animate-in fade-in" onClick={(e) => e.stopPropagation()} onMouseDown={(e) => e.stopPropagation()} onTouchStart={(e) => e.stopPropagation()}>
                                            <button onClick={(e) => { e.stopPropagation(); setShareBeanData(bean); setBeanMenuIdx(null); }} className="flex flex-col items-center text-white gap-1"><div className="p-2 bg-slate-800 rounded-full"><ImageIcon size={20}/></div><span className="text-[10px] font-bold">원두 카드</span></button>
                                            <button onClick={(e) => { e.stopPropagation(); handleBeanTextShare(bean); }} className="flex flex-col items-center text-white gap-1"><div className="p-2 bg-slate-800 rounded-full"><FileText size={20}/></div><span className="text-[10px] font-bold">텍스트</span></button>
                                            <button onClick={(e) => { e.stopPropagation(); handleAppShare(); }} className="flex flex-col items-center text-white gap-1"><div className="p-2 bg-slate-800 rounded-full"><Share2 size={20}/></div><span className="text-[10px] font-bold">앱 공유</span></button>
                                            <button onClick={(e) => { e.stopPropagation(); setBeanMenuIdx(null); }} className="absolute top-0 right-0 p-4 text-slate-500 hover:text-slate-300"><X size={20}/></button>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </main>
                    </>
                )}

                {view === VIEW.DETAIL && activeBean && (
                    <div className="flex flex-col h-full bg-white dark:bg-slate-900">
                        <header className="p-4 pt-4 border-b dark:border-slate-800 flex justify-between items-center sticky top-0 z-10 bg-white dark:bg-slate-900"><button onClick={goBack} className="p-2"><ChevronLeft/></button><span className="font-bold text-xs uppercase tracking-widest text-slate-400">Detail</span><button onClick={() => { setBeanForm({ ...activeBean }); setTempOcrImage(null); updateView(VIEW.EDIT_BEAN, activeBean.id); }} className="text-sm font-bold underline px-2">수정</button></header>

                            <div className="p-6 pb-0">
